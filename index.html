<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Countdown 1080p</title>

  <style>
    /* ===== FIXED 1080p CANVAS ===== */
    body {
      margin: 0;
      padding: 0;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: black;
    }

    /* ===== BACKGROUND VIDEO ===== */
    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 1920px;
      height: 1080px;
      object-fit: cover;
      z-index: -1;
    }

    /* dark overlay */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 1920px;
      height: 1080px;
      background: rgba(0, 0, 0, 0.1);
    }

    /* ===== COUNTDOWN (1080p CENTERED) ===== */
    .countdown {
      position: absolute;
      top: 540px;   /* center of 1080 */
      left: 960px;  /* center of 1920 */
      transform: translate(-50%, -50%);
      display: flex;
      gap: 60px;
      text-align: center;
    }

    .time-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 140px;
    }

    /* numbers */
    .time-box div:first-child {
      font-size: 4.5rem;
      font-weight: bold;
      color: #33BBED;
    }

    /* labels */
    .label {
      font-size: 1.5rem;
      margin-top: 10px;
      color: white;
      letter-spacing: 2px;
      opacity: 1;
    }
  </style>
</head>

<body>

  <!-- Background Video -->
  <video autoplay muted loop playsinline>
    <source src="commencement3.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <!-- Countdown -->
  <div class="countdown">
    <div class="time-box">
      <div id="days">0</div>
      <div class="label">Days</div>
    </div>

    <div class="time-box">
      <div id="hours">0</div>
      <div class="label">Hours</div>
    </div>

    <div class="time-box">
      <div id="minutes">0</div>
      <div class="label">Minutes</div>
    </div>

    <div class="time-box">
      <div id="seconds">0</div>
      <div class="label">Seconds</div>
    </div>
  </div>

  <script>
    const targetDate = new Date("2026-05-015T11:00:00").getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance <= 0) {
        document.querySelector(".countdown").innerHTML = "Time's up!";
        return;
      }

      document.getElementById("days").innerText =
        Math.floor(distance / (1000 * 60 * 60 * 24));

      document.getElementById("hours").innerText =
        Math.floor((distance / (1000 * 60 * 60)) % 24);

      document.getElementById("minutes").innerText =
        Math.floor((distance / (1000 * 60)) % 60);

      document.getElementById("seconds").innerText =
        Math.floor((distance / 1000) % 60);
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>

</body>
</html>
