<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Countdown</title>

<style>
  body {
    margin: 0;
    width: 1920px;
    height: 837px;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: black;
  }

  /* STATIC BACKGROUND IMAGE */
  .bg {
    position: fixed;
    width: 1920px;
    height: 837px;
    object-fit: cover;
    z-index: -1;
  }


  /* COUNTDOWN (Photoshop-style positioning) */
  .countdown {
    position: absolute;
    top: 440px;
    left: 1280px;
    transform: translate(-50%, -50%);
    display: flex;
    gap: 30px;
    text-align: center;
  }

  .box {
    min-width: 140px;
  }

  .num {
    font-size: 6rem;
    color: #33BBED;
    font-weight: bold;
  }

  .label {
    font-size: 1.7rem;
    color: white;
    margin-top: 10px;
    letter-spacing: 2px;
  }
</style>
</head>

<body>

<!-- BACKGROUND IMAGE -->
<img class="bg" src="wave.jpg" />

<div class="overlay"></div>

<!-- COUNTDOWN -->
<div class="countdown">
  <div class="box">
    <div id="d" class="num">0</div>
    <div class="label">Days</div>
  </div>

  <div class="box">
    <div id="h" class="num">0</div>
    <div class="label">Hours</div>
  </div>

  <div class="box">
    <div id="m" class="num">0</div>
    <div class="label">Minutes</div>
  </div>

  <div class="box">
    <div id="s" class="num">0</div>
    <div class="label">Seconds</div>
  </div>
</div>

<script>
const target = new Date("2026-05-15T11:00:00").getTime();

function tick() {
  const now = Date.now();
  const diff = target - now;

  if (diff <= 0) return;

  document.getElementById("d").textContent = Math.floor(diff / 86400000);
  document.getElementById("h").textContent = Math.floor(diff / 3600000 % 24);
  document.getElementById("m").textContent = Math.floor(diff / 60000 % 60);
  document.getElementById("s").textContent = Math.floor(diff / 1000 % 60);
}

tick();
setInterval(tick, 1000);
</script>

</body>
</html>
