<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Countdown</title>

  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    /* Background video */
    video {
      position: fixed;
      top: 0;
      left: 0;
      min-width: 100%;
      min-height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* Dark overlay for readability */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
    }

    /* Countdown container */
    .countdown {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      gap: 30px;
      text-align: center;
      color: #33BBED;
    }

    .time-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 100px;
    }

    .time-box div:first-child {
      font-size: 4rem;
      font-weight: bold;
    }

    .label {
      font-size: 1rem;
      margin-top: 8px;
      opacity: 0.85;
      letter-spacing: 1px;
    }
  </style>
</head>

<body>

  <!-- Background video -->
  <video autoplay muted loop playsinline>
    <source src="assets/background.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <!-- Countdown -->
  <div class="countdown">
    <div class="time-box">
      <div id="days">0</div>
      <div class="label">Days</div>
    </div>

    <div class="time-box">
      <div id="hours">0</div>
      <div class="label">Hours</div>
    </div>

    <div class="time-box">
      <div id="minutes">0</div>
      <div class="label">Minutes</div>
    </div>

    <div class="time-box">
      <div id="seconds">0</div>
      <div class="label">Seconds</div>
    </div>
  </div>

  <script>
    const targetDate = new Date("2026-05-15T11:00:00").getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance <= 0) {
        document.querySelector(".countdown").innerHTML = "Time's up!";
        return;
      }

      document.getElementById("days").innerText =
        Math.floor(distance / (1000 * 60 * 60 * 24));

      document.getElementById("hours").innerText =
        Math.floor((distance / (1000 * 60 * 60)) % 24);

      document.getElementById("minutes").innerText =
        Math.floor((distance / (1000 * 60)) % 60);

      document.getElementById("seconds").innerText =
        Math.floor((distance / 1000) % 60);
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>

</body>
</html>
